<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>529 GPU服务器监控</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<link href="https://cdn.jsdelivr.net/npm/layui@2.9.20/dist/css/layui.min.css" rel="stylesheet">


<style>
body{

    background:#f5f6fa;

}


#server-list{

    padding:8px;

}



/* 卡片 */

.server-card{


    height:170px;

    border-radius:8px;

    padding-bottom:28px;

    overflow:hidden;

    background:white;

    box-shadow:0 1px 6px rgba(0,0,0,.12);

}



/* 在线 */

.server-card.online{

    border-left:4px solid #52c41a;

}



/* 离线 */

.server-card.offline{

    border-left:4px solid #999;

}



/*
    离线整体灰化
*/


.server-card.offline .layui-card-header,
.server-card.offline .layui-card-body,
.server-card.offline .gpu-box,
.server-card.offline .gpu-title,
.server-card.offline .process,
.server-card.offline .update-time,
.server-card.offline .ip{

    color:#999!important;

}



/* GPU背景灰 */

.server-card.offline .gpu-box{

    background:#eeeeee;

}



/* 显存条灰 */

.server-card.offline .mem-inner{

    background:#aaa;

}



/* 温度灰掉 */

.server-card.offline .temp-normal,
.server-card.offline .temp-warning,
.server-card.offline .temp-danger{

    color:#999!important;

}




/* 离线标识保持红色 */

.server-card.offline .machine-status{

    color:#ff4d4f!important;

}




.layui-card-header{


    height:34px!important;

    line-height:34px!important;

    padding:0 8px!important;

    font-size:14px!important;

    font-weight:bold;

}





.machine-status{

    float:right;

}



.online-text{

    color:#52c41a;

}


.offline-text{

    color:#ff4d4f;

}




.layui-card-body{


    padding:6px 8px!important;

    font-size:12px;

}





.update-time{


    color:#999;

    font-size:11px;

    margin-bottom:4px;

}




.gpu-list{


    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:4px;

}




.gpu-box{


    background:#f7f7f7;

    border-radius:4px;

    padding:3px 5px;

    height:52px;

    overflow:hidden;

    line-height:15px;


}




.gpu-title{


    display:flex;

    justify-content:space-between;

    font-weight:bold;


}




.temp-normal{

    color:#52c41a;

}



.temp-warning{

    color:#ff9800;

}



.temp-danger{

    color:red;

}




.mem-bar{


    height:4px;

    background:#ddd;

    border-radius:5px;

    overflow:hidden;


}



.mem-inner{


    height:100%;

    background:#409eff;


}




.process{


    color:#666;

    font-size:11px;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;


}

</style>


</head>


<body>



<div class="layui-container-fluid">


<div class="layui-row layui-col-space8" id="server-list">


</div>


</div>





<script src="https://cdn.jsdelivr.net/npm/layui@2.9.20/dist/layui.min.js"></script>


<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.js"></script>



<script>



const API =
"https://server529.cvzoo.cn:8000/all_server";


// 十分钟离线

const OFFLINE_TIME =
70*1000;




loadServer();



// 60秒刷新

setInterval(function(){

    loadServer();

},60000);






function loadServer(){


    $.get(API,function(data){


        render(data);


    });


}





function render(data){



let machines={};





// 聚合机器

data.forEach(item=>{


    let key =
    item.machine+"_"+item.ip;



    if(!machines[key]){


        machines[key]={

            machine:item.machine,

            ip:item.ip,

            gpus:[]

        };


    }



    machines[key].gpus.push(item);



});







let html="";







Object.values(machines).forEach(server=>{



    let lastTime=0;



    server.gpus.forEach(g=>{


        let t =
        new Date(
            g.update_time.trim()
        ).getTime();



        if(t>lastTime){

            lastTime=t;

        }


    });




    let offline =
    Date.now()-lastTime
    >
    OFFLINE_TIME;






    let gpuHtml="";





    server.gpus.forEach(gpu=>{


        let percent =
        Math.round(
            gpu.used/gpu.all_mem*100
        );



        let tempClass="temp-normal";



        if(gpu.tmp>=85){

            tempClass="temp-danger";


        }else if(gpu.tmp>=70){

            tempClass="temp-warning";


        }







        gpuHtml+=`


        <div class="gpu-box">


            <div class="gpu-title">


                <span>
                GPU${gpu.gpu}
                </span>


                <span class="${tempClass}">
                ${gpu.tmp}℃
                </span>


            </div>




            <div>


            ${percent}%


            ${Math.round(gpu.used/1024)}
            /
            ${Math.round(gpu.all_mem/1024)}
            G


            </div>




            <div class="mem-bar">


                <div class="mem-inner"
                style="width:${percent}%">

                </div>


            </div>





            <div class="process">


            进程:
            ${gpu.pids || "-"}


            </div>



        </div>


        `;



    });








    html+=`



<div class="layui-col-xl2 layui-col-lg3 layui-col-md4 layui-col-sm6">


<div class="layui-card server-card
${offline?'offline':'online'}">





<div class="layui-card-header">



🖥 ${server.machine}.cvzoo.cn

&nbsp;

${server.ip}



<span class="machine-status
${offline?'offline-text':'online-text'}">


${offline?'🔴':'🟢'}


</span>



</div>





<div class="layui-card-body">





<div class="update-time">


更新时间:

${new Date(lastTime).toLocaleString()}


</div>






<div class="gpu-list">


${gpuHtml}


</div>




</div>




</div>



</div>



`;



});




$("#server-list").html(html);



}



</script>


</body>

</html>
